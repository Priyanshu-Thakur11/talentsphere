name: nileshapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  file_picker: ^10.3.3
  flutter:
    sdk: flutter
  google_fonts: ^6.3.2
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API (using only one HTTP client to reduce size)
  dio: ^5.7.0
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
